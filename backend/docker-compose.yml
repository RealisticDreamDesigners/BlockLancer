version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: workshield_user
      POSTGRES_PASSWORD: workshield_password
      POSTGRES_DB: workshield
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d/

volumes:
  postgres_data:
